name: Release
on:
    workflow_dispatch:
      inputs:
        version:
          description: Appended version
          required: true
          type: string
          default: "rc"
jobs:
    release:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repository
          uses: actions/checkout@v6
        
        - name: Install dependencies
          run: |
            sudo apt install zip

        - name: Get current date
          id: date
          run: |
            echo "date=$(date +"%Y%m%d")" >> $GITHUB_OUTPUT
        
        - name: Create assets
          env:
            version: ${{ inputs.version }}
          run: |
            for dir in versions/*/; do
              mc_version=$(basename "$dir")
              (
                cd "$dir"
                zip -r $(git rev-parse --show-toplevel)/bin/${GITHUB_REPOSITORY#*/}+${{ steps.date.outputs.date }}-${version}+${mc_version}.zip *
              )
            done
        
        - name: Create release
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            tag: ${{ steps.date.outputs.date }}
          run: |
            gh release create "$tag" --repo="$GITHUB_REPOSITORY" --title="${GITHUB_REPOSITORY#*/}+${tag}" --generate-notes
        
        - name: Upload assets to GitHub
          uses: AButler/upload-release-assets@v4.0
          with:
            files: "bin/*"
            repo-token: ${{ secrets.GITHUB_TOKEN }}
            release-tag: ${{ steps.date.outputs.date }}